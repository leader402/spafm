name: spafm
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - scikit-learn>=1.3
  - h5py
  - zarr
  - pyyaml
  - tqdm
  - rich
  - jupyterlab
  - ipykernel
  # 单细胞 / 空间生信
  - anndata>=0.10
  - scanpy>=1.10
  - squidpy>=1.4
  - leidenalg
  - python-igraph
  # 深度学习（可选，按机器手动调）
  # - pytorch::pytorch>=2.2
  # - pytorch::pytorch-cuda=12.1
  - pip:
      - lightning>=2.2
      - torchmetrics>=1.3
      - typer>=0.12
      - -e .
